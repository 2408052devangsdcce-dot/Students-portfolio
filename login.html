<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #A8EDDA;
    --sky: #B8D8F8;
    --lavender: #D4C5F9;
    --peach: #FFD6C0;
    --yellow: #FFF3B0;
    --coral: #FF8C7A;
    --purple: #8B6FD4;
    --teal: #3DBFA0;
    --blue: #5BA3D9;
    --dark: #2C2C3E;
    --mid: #4A4A6A;
    --light: #F7F5FF;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #E8F4FD 0%, #F0EBFF 40%, #E8FFF7 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-blobs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    animation: float 8s ease-in-out infinite;
  }
  .blob-1 { width: 350px; height: 350px; background: var(--lavender); top: -80px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 280px; height: 280px; background: var(--mint); bottom: -60px; right: -60px; animation-delay: 3s; }
  .blob-3 { width: 200px; height: 200px; background: var(--peach); top: 50%; left: 60%; animation-delay: 1.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }
  .container {
    position: relative; z-index: 1;
    display: flex; gap: 0;
    background: white;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(100, 80, 200, 0.15);
    overflow: hidden;
    width: 900px; max-width: 95vw;
    min-height: 560px;
  }
  .brand-panel {
    background: linear-gradient(160deg, #7C5CBF 0%, #4EAED4 60%, #3DBFA0 100%);
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 40px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .brand-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .brand-logo { font-size: 48px; margin-bottom: 12px; }
  .brand-title { font-size: 30px; font-weight: 900; margin-bottom: 10px; }
  .brand-subtitle { font-size: 14px; opacity: 0.85; text-align: center; line-height: 1.6; max-width: 220px; }
  .brand-features { margin-top: 40px; display: flex; flex-direction: column; gap: 14px; }
  .feature-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px; padding: 10px 16px;
    font-size: 13px; font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .feature-icon { font-size: 20px; }
  .form-panel {
    flex: 1;
    padding: 50px 45px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .form-header h2 { font-size: 26px; font-weight: 900; color: var(--dark); }
  .form-header p { color: var(--mid); font-size: 14px; margin-top: 5px; }
  .form-group { margin-top: 22px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--mid); margin-bottom: 7px; }
  .form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #E8E4F5;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: var(--light);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 4px rgba(139,111,212,0.12);
    background: white;
  }
  .forgot { display: block; text-align: right; font-size: 12px; color: var(--purple); font-weight: 600; margin-top: 6px; cursor: pointer; text-decoration: none; }
  .forgot:hover { text-decoration: underline; }
  .btn-login {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: white;
    border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(139,111,212,0.35);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(139,111,212,0.45); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider span { font-size: 12px; color: #AAA; font-weight: 600; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E8E4F5; }
  .switch-link { text-align: center; font-size: 13px; color: var(--mid); }
  .switch-link a { color: var(--purple); font-weight: 800; text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }
  @media (max-width: 600px) {
    .brand-panel { display: none; }
    .form-panel { padding: 40px 28px; }
    .container { width: 95vw; }
  }
</style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="container">
  <div class="brand-panel">
    <div class="brand-logo">📚</div>
    <div class="brand-title">StudyHub</div>
    <div class="brand-subtitle">Your productive study companion — track, learn, and connect.</div>
    <div class="brand-features">
      <div class="feature-item"><span class="feature-icon">⏱️</span> Smart Study Timer</div>
      <div class="feature-item"><span class="feature-icon">🎵</span> Focus Music</div>
      <div class="feature-item"><span class="feature-icon">💬</span> Community Chat</div>
      <div class="feature-item"><span class="feature-icon">📋</span> Task Manager</div>
    </div>
  </div>
  <div class="form-panel">
    <div class="form-header">
      <h2>Welcome back! 👋</h2>
      <p>Log in to continue your study journey</p>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button class="btn-login" onclick="handleLogin()">Log In →</button>
    <div class="divider"><span>OR</span></div>
    <div class="switch-link">
      New to StudyHub? <a href="signup.html">Create an account</a>
    </div>
  </div>
</div>
<script>
function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { alert('Please fill in all fields.'); return; }
  const users = JSON.parse(localStorage.getItem('studyhub_users') || '[]');
  const user = users.find(u => u.email === email && u.password === pass);
  if (!user) { alert('Invalid credentials. Please try again or sign up.'); return; }
  localStorage.setItem('studyhub_current', JSON.stringify(user));
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
